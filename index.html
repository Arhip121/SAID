<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CAIД — Мессенджер и Лента</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: #0e1621;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .app {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: #1e1f2c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .top-bar {
            background: #2b2d3e;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #3e405b;
            flex-shrink: 0;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            background: #ffb347;
            flex-shrink: 0;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-details {
            flex: 1;
            min-width: 0;
        }
        .user-name {
            font-weight: bold;
            color: white;
            font-size: 1rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .user-status {
            font-size: 0.7rem;
            color: #88cc88;
        }
        .edit-profile {
            background: none;
            border: none;
            color: #ffaa66;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            flex-shrink: 0;
        }
        .bottom-nav {
            background: #171925;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            border-top: 1px solid #2c2f3f;
            flex-shrink: 0;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 0.8rem;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-btn.active {
            color: #ffaa66;
        }
        .nav-btn i {
            font-size: 1.4rem;
        }
        .page {
            flex: 1;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            padding: 12px;
        }
        .page.active {
            display: flex;
        }
        .feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .create-post {
            background: #2b2d3e;
            border-radius: 24px;
            padding: 12px;
        }
        .create-post textarea {
            width: 100%;
            background: #1e1f2c;
            border: none;
            padding: 12px;
            border-radius: 20px;
            color: white;
            resize: none;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .media-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .media-buttons button {
            background: #3e405b;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .selected-file-name {
            font-size: 0.8rem;
            color: #aaa;
            margin: 4px 0;
        }
        .publish-btn {
            background: #2c6e9e;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            width: 100%;
            cursor: pointer;
        }
        .post {
            background: #2b2d3e;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ffb347;
            overflow: hidden;
            flex-shrink: 0;
        }
        .post-author {
            font-weight: bold;
            color: white;
        }
        .post-time {
            font-size: 0.7rem;
            color: #aaa;
        }
        .post-text {
            color: #eee;
            margin-bottom: 12px;
            word-break: break-word;
        }
        .post-media {
            margin-bottom: 12px;
            max-width: 100%;
            border-radius: 16px;
            overflow: hidden;
        }
        .post-media img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            background: black;
        }
        .post-actions {
            display: flex;
            gap: 20px;
            border-top: 1px solid #3e405b;
            padding-top: 10px;
        }
        .post-actions button {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .post-actions button.liked {
            color: #ff5e7c;
        }
        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .group-item {
            background: #2b2d3e;
            padding: 14px 16px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: white;
        }
        .group-item.active {
            background: #2c6e9e;
        }
        .add-group-btn {
            background: #2b2d3e;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            margin-top: 12px;
            cursor: pointer;
        }
        .chat-window {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1e1f2c;
            z-index: 20;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #2b2d3e;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #3e405b;
            flex-shrink: 0;
        }
        .back-btn {
            background: none;
            border: none;
            color: #ffaa66;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }
        .message.me {
            align-self: flex-end;
        }
        .message.other {
            align-self: flex-start;
        }
        .message-header {
            font-size: 0.7rem;
            color: #aaa;
            margin-bottom: 2px;
        }
        .bubble {
            padding: 8px 12px;
            border-radius: 18px;
            background: #2c2f3f;
            color: white;
            word-break: break-word;
        }
        .me .bubble {
            background: #2c6e9e;
        }
        .chat-input-area {
            background: #1e1f2c;
            padding: 8px 12px;
            border-top: 1px solid #3a3c55;
            flex-shrink: 0;
        }
        .chat-form {
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            background: #2b2d3e;
            border: none;
            padding: 10px 14px;
            border-radius: 30px;
            color: white;
            outline: none;
        }
        .send-btn {
            background: #2c6e9e;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #252736;
            border-radius: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            color: white;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
        }
        .toggle-switch {
            width: 52px;
            height: 26px;
            background: #4f5270;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch.active {
            background: #ff8c42;
        }
        .toggle-switch::after {
            content: "";
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active::after {
            left: 27px;
        }
        .comments-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .comment {
            padding: 8px;
            border-bottom: 1px solid #3e405b;
        }
        .comment-author {
            font-weight: bold;
            font-size: 0.8rem;
        }
        .comment-text {
            font-size: 0.9rem;
        }
        .users-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .user-call-item {
            padding: 10px;
            background: #2b2d3e;
            margin: 5px 0;
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }
        body.geevka .app {
            background: linear-gradient(145deg, #2b1b3a, #1a1a2e);
        }
        body.geevka .top-bar, body.geevka .chat-header {
            background: linear-gradient(90deg, #ff66b5, #ffd966, #66ff66, #66ccff, #bf66ff);
        }
        body.geevka .me .bubble {
            background: linear-gradient(135deg, #ff77aa, #ffaa77);
        }
        body.geevka .other .bubble {
            background: linear-gradient(135deg, #aa88ff, #77aaff);
        }
        body.rkn-mode .app {
            filter: grayscale(0.7) contrast(0.9);
            border: 3px solid #8b0000;
        }
        body.rkn-mode .chat-input, body.rkn-mode .send-btn {
            pointer-events: none;
            opacity: 0.5;
        }
        .rkn-warning {
            display: none;
            background: #a1220a;
            color: #ffc;
            padding: 8px;
            text-align: center;
            font-size: 0.75rem;
        }
        body.rkn-mode .rkn-warning {
            display: block;
        }
        @media (max-width: 600px) {
            .nav-btn span {
                display: none;
            }
            .nav-btn i {
                font-size: 1.6rem;
            }
            .nav-btn {
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="top-bar">
        <div class="avatar"><img src="https://i.ibb.co/Rk6Gbmy7/2026-03-24-22-19-36.jpg" alt="avatar"></div>
        <div class="user-details">
            <div class="user-name" id="userName">Загрузка...</div>
            <div class="user-status">онлайн</div>
        </div>
        <button class="edit-profile" id="editProfileBtn"><i class="fas fa-edit"></i></button>
        <button class="edit-profile" id="settingsBtn"><i class="fas fa-cog"></i></button>
        <button class="edit-profile" id="anthemBtn"><i class="fas fa-music"></i></button>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" data-page="feed"><i class="fas fa-newspaper"></i><span>Лента</span></button>
        <button class="nav-btn" data-page="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
    </div>

    <!-- Страница ленты -->
    <div class="page active" id="feedPage">
        <div class="feed">
            <div class="create-post">
                <textarea id="postText" rows="2" placeholder="Что нового?"></textarea>
                <div class="media-buttons">
                    <button id="uploadPhotoBtn"><i class="fas fa-image"></i> Фото</button>
                </div>
                <div id="selectedFileName" class="selected-file-name"></div>
                <button class="publish-btn" id="publishPostBtn">Опубликовать</button>
            </div>
            <div id="postsList"></div>
        </div>
    </div>

    <!-- Страница чатов -->
    <div class="page" id="chatsPage">
        <div class="chats-list" id="groupsList"></div>
        <button class="add-group-btn" id="addGroupBtn"><i class="fas fa-plus"></i> Создать группу</button>
    </div>

    <!-- Окно чата -->
    <div id="chatWindow" class="chat-window" style="display: none;">
        <div class="chat-header">
            <button class="back-btn" id="closeChatBtn"><i class="fas fa-arrow-left"></i></button>
            <div class="user-name" id="chatGroupName"></div>
            <button class="call-btn" id="callInChatBtn" style="margin-left: auto; background: #2c6e9e; border: none; padding: 6px 12px; border-radius: 30px; color: white;"><i class="fas fa-phone"></i> Звонок</button>
        </div>
        <div class="rkn-warning" id="chatRknWarning">⚠️ РКН: отправка сообщений и звонки заблокированы</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <form class="chat-form" id="chatForm">
                <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение...">
                <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>
</div>

<!-- Модалки -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Настройки</h3>
        <div class="setting-item">
            <span>🌈 Режим «Геевка»</span>
            <div class="toggle-switch" id="geevkaToggle"></div>
        </div>
        <div class="setting-item">
            <span>⚖️ Режим Роскомнадзор</span>
            <div class="toggle-switch" id="rknToggle"></div>
        </div>
        <div class="setting-item">
            <span>🖼️ ImgBB API ключ</span>
            <input type="text" id="imgbbApiKey" placeholder="Вставьте ключ" style="flex:1; margin-left:10px; background:#2b2d3e; border:none; border-radius:30px; padding:6px 12px; color:white;">
        </div>
        <img src="https://i.ibb.co/xSy0mnGv/i-31.png" style="height:40px; display:block; margin:10px auto;">
        <button class="close-modal-btn" style="background:#3c3f5e; border:none; padding:10px; width:100%; border-radius:40px; margin-top:20px; cursor:pointer;">Закрыть</button>
    </div>
</div>

<div id="nicknameModal" class="modal">
    <div class="modal-content">
        <h3>Изменить имя</h3>
        <input type="text" id="newNickname" placeholder="Ваш ник" style="width:100%; padding:12px; background:#2b2d3e; border:none; border-radius:30px; color:white;">
        <button id="saveNicknameBtn" style="margin-top:16px; width:100%; padding:10px; background:#2c6e9e; border:none; border-radius:40px; color:white;">Сохранить</button>
    </div>
</div>

<div id="createGroupModal" class="modal">
    <div class="modal-content">
        <h3>Создать группу</h3>
        <input type="text" id="newGroupName" placeholder="Название группы" style="width:100%; padding:12px; background:#2b2d3e; border:none; border-radius:30px; color:white;">
        <button id="confirmCreateGroupBtn" style="margin-top:16px; width:100%; padding:10px; background:#2c6e9e; border:none; border-radius:40px; color:white;">Создать</button>
    </div>
</div>

<div id="commentsModal" class="modal">
    <div class="modal-content">
        <h3>Комментарии</h3>
        <div id="commentsList" class="comments-list"></div>
        <textarea id="newCommentText" rows="2" placeholder="Написать комментарий..." style="width:100%; background:#2b2d3e; border:none; border-radius:20px; padding:8px; color:white; margin:8px 0;"></textarea>
        <button id="addCommentBtn" style="width:100%; padding:8px; background:#2c6e9e; border:none; border-radius:30px; color:white;">Отправить</button>
        <button class="close-modal-btn" style="margin-top:12px; background:#3c3f5e; border:none; padding:8px; width:100%; border-radius:30px; cursor:pointer;">Закрыть</button>
    </div>
</div>

<div id="callUserModal" class="modal">
    <div class="modal-content">
        <h3>Выберите пользователя для звонка</h3>
        <div class="users-list" id="usersListForCall"></div>
        <button class="close-modal-btn" id="closeCallModal" style="background:#3c3f5e; border:none; padding:8px; width:100%; border-radius:30px; cursor:pointer;">Отмена</button>
    </div>
</div>

<audio id="ringtone" loop><source src="https://audio.jukehost.co.uk/fuZQV1lakc84kmMnIHRnfK6ZTcq9KEBk" type="audio/mpeg"></audio>
<audio id="localRingtone" loop><source src="https://audio.jukehost.co.uk/fuZQV1lakc84kmMnIHRnfK6ZTcq9KEBk" type="audio/mpeg"></audio>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyCc7rd2MbIVmkpjh2rVc0dgn_PZuLz1-Ys",
        authDomain: "said-6d6ed.firebaseapp.com",
        databaseURL: "https://said-6d6ed-default-rtdb.firebaseio.com",
        projectId: "said-6d6ed",
        storageBucket: "said-6d6ed.appspot.com",
        messagingSenderId: "716757584874",
        appId: "1:716757584874:web:4f6681d8639d5067f28093",
        measurementId: "G-CPV7TXYDMT"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // DOM элементы
    const userNameSpan = document.getElementById('userName');
    const editProfileBtn = document.getElementById('editProfileBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const anthemBtn = document.getElementById('anthemBtn');
    const postsListDiv = document.getElementById('postsList');
    const groupsListDiv = document.getElementById('groupsList');
    const addGroupBtn = document.getElementById('addGroupBtn');
    const chatWindow = document.getElementById('chatWindow');
    const chatGroupNameSpan = document.getElementById('chatGroupName');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('chatInput');
    const closeChatBtn = document.getElementById('closeChatBtn');
    const callInChatBtn = document.getElementById('callInChatBtn');
    const postText = document.getElementById('postText');
    const publishPostBtn = document.getElementById('publishPostBtn');
    const uploadPhotoBtn = document.getElementById('uploadPhotoBtn');
    const selectedFileNameDiv = document.getElementById('selectedFileName');
    const settingsModal = document.getElementById('settingsModal');
    const nicknameModal = document.getElementById('nicknameModal');
    const createGroupModal = document.getElementById('createGroupModal');
    const commentsModal = document.getElementById('commentsModal');
    const commentsListDiv = document.getElementById('commentsList');
    const newCommentText = document.getElementById('newCommentText');
    const addCommentBtn = document.getElementById('addCommentBtn');
    const callUserModal = document.getElementById('callUserModal');
    const usersListForCall = document.getElementById('usersListForCall');
    const closeCallModal = document.getElementById('closeCallModal');
    const geevkaToggle = document.getElementById('geevkaToggle');
    const rknToggle = document.getElementById('rknToggle');
    const saveNicknameBtn = document.getElementById('saveNicknameBtn');
    const confirmCreateGroupBtn = document.getElementById('confirmCreateGroupBtn');
    const imgbbApiKeyInput = document.getElementById('imgbbApiKey');
    const ringtone = document.getElementById('ringtone');
    const localRingtone = document.getElementById('localRingtone');

    let currentUser = null;
    let currentGroupId = null;
    let messagesRef = null;
    let callRef = null;
    let peer = null;
    let isInCall = false;
    let isCalling = false;
    let currentPostForComments = null;
    let selectedFile = null;

    // Режимы
    let geevkaActive = false, rknActive = false;
    function applyGeevka(enable) {
        geevkaActive = enable;
        document.body.classList.toggle('geevka', enable);
        if(geevkaToggle) geevkaToggle.classList.toggle('active', enable);
        localStorage.setItem('geevka', enable);
    }
    function applyRkn(enable) {
        rknActive = enable;
        document.body.classList.toggle('rkn-mode', enable);
        if(rknToggle) rknToggle.classList.toggle('active', enable);
        localStorage.setItem('rkn', enable);
        if(chatInput) chatInput.disabled = enable;
        if(document.querySelector('#chatForm .send-btn')) document.querySelector('#chatForm .send-btn').disabled = enable;
        if(callInChatBtn) callInChatBtn.disabled = enable;
    }
    if(localStorage.getItem('geevka') === 'true') applyGeevka(true);
    if(localStorage.getItem('rkn') === 'true') applyRkn(true);
    geevkaToggle.onclick = () => applyGeevka(!geevkaActive);
    rknToggle.onclick = () => applyRkn(!rknActive);

    // Сохранение API ключа ImgBB
    let imgbbApiKey = localStorage.getItem('imgbbApiKey') || '53d3ddff703aa1bf95808cde407ece0f';
    imgbbApiKeyInput.value = imgbbApiKey;
    imgbbApiKeyInput.onchange = () => {
        imgbbApiKey = imgbbApiKeyInput.value.trim();
        localStorage.setItem('imgbbApiKey', imgbbApiKey);
    };

    // Переключение страниц
    const navBtns = document.querySelectorAll('.nav-btn');
    const pages = document.querySelectorAll('.page');
    navBtns.forEach(btn => {
        btn.onclick = () => {
            const pageId = btn.dataset.page;
            pages.forEach(p => p.classList.remove('active'));
            document.getElementById(`${pageId}Page`).classList.add('active');
            navBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(pageId === 'chats') loadGroups();
            if(pageId === 'feed') loadPosts();
        };
    });

    // Анонимная аутентификация
    function initAnonymousAuth() {
        auth.signInAnonymously()
            .then(userCred => {
                currentUser = userCred.user;
                db.ref(`users/${currentUser.uid}/name`).once('value', snap => {
                    let name = snap.val();
                    if(!name) {
                        const defaultName = 'Гость_' + currentUser.uid.slice(0,6);
                        name = prompt('Введите ваш ник:', defaultName);
                        if(!name) name = defaultName;
                        db.ref(`users/${currentUser.uid}/name`).set(name);
                    }
                    userNameSpan.innerText = name;
                });
                const defaultGroups = ['Общий чат', 'Друзья'];
                defaultGroups.forEach(gName => {
                    db.ref('groups').orderByChild('name').equalTo(gName).once('value', snap => {
                        if(!snap.exists()) {
                            db.ref('groups').push({ name: gName, createdAt: Date.now() });
                        }
                    });
                });
                loadPosts();
                loadGroups();
            })
            .catch(err => {
                console.error('Ошибка аутентификации:', err);
                alert('Ошибка подключения к Firebase. Убедитесь, что в консоли Firebase включена анонимная аутентификация.');
            });
    }

    // Загрузка ленты
    function loadPosts() {
        db.ref('posts').orderByChild('timestamp').once('value', snap => {
            const posts = snap.val();
            postsListDiv.innerHTML = '';
            if(posts) {
                const sorted = Object.entries(posts).sort((a,b) => b[1].timestamp - a[1].timestamp);
                sorted.forEach(([id, post]) => {
                    const postDiv = document.createElement('div');
                    postDiv.className = 'post';
                    postDiv.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar"><img src="https://i.ibb.co/Rk6Gbmy7/2026-03-24-22-19-36.jpg" style="width:100%;height:100%;object-fit:cover;"></div>
                            <div><div class="post-author">${escapeHtml(post.authorName)}</div><div class="post-time">${new Date(post.timestamp).toLocaleString()}</div></div>
                        </div>
                        <div class="post-text">${escapeHtml(post.text)}</div>
                        ${post.mediaUrl ? `<div class="post-media"><img src="${post.mediaUrl}"></div>` : ''}
                        <div class="post-actions">
                            <button class="like-btn" data-id="${id}"><i class="fas fa-heart"></i> ${post.likes || 0}</button>
                            <button class="comment-btn" data-id="${id}"><i class="fas fa-comment"></i> ${post.commentsCount || 0}</button>
                        </div>
                    `;
                    postsListDiv.appendChild(postDiv);
                });
                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.onclick = () => likePost(btn.dataset.id);
                });
                document.querySelectorAll('.comment-btn').forEach(btn => {
                    btn.onclick = () => openCommentsModal(btn.dataset.id);
                });
            }
        });
    }

    function likePost(postId) {
        const likeRef = db.ref(`posts/${postId}/likes`);
        likeRef.transaction(current => (current || 0) + 1);
        loadPosts();
    }

    function openCommentsModal(postId) {
        currentPostForComments = postId;
        loadComments(postId);
        commentsModal.classList.add('active');
    }
    function loadComments(postId) {
        db.ref(`comments/${postId}`).orderByChild('timestamp').once('value', snap => {
            const comments = snap.val();
            commentsListDiv.innerHTML = '';
            if(comments) {
                Object.values(comments).forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'comment';
                    div.innerHTML = `<div class="comment-author">${escapeHtml(c.authorName)}</div><div class="comment-text">${escapeHtml(c.text)}</div>`;
                    commentsListDiv.appendChild(div);
                });
            } else {
                commentsListDiv.innerHTML = '<div>Нет комментариев</div>';
            }
        });
    }
    addCommentBtn.onclick = () => {
        const text = newCommentText.value.trim();
        if(!text || !currentPostForComments) return;
        const comment = {
            authorId: currentUser.uid,
            authorName: userNameSpan.innerText,
            text: text,
            timestamp: Date.now()
        };
        db.ref(`comments/${currentPostForComments}`).push(comment);
        db.ref(`posts/${currentPostForComments}/commentsCount`).transaction(c => (c || 0) + 1);
        newCommentText.value = '';
        loadComments(currentPostForComments);
    };

    // Загрузка фото на ImgBB
    async function uploadToImgBB(file, apiKey) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', apiKey);
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (!data.success) throw new Error(data.error?.message || 'Ошибка загрузки');
        return data.data.url;
    }

    publishPostBtn.onclick = async () => {
        const text = postText.value.trim();
        if(!text && !selectedFile) { alert('Напишите текст или добавьте фото'); return; }
        if(selectedFile && !imgbbApiKey) {
            alert('Для загрузки фото вставьте API ключ ImgBB в настройках');
            return;
        }
        let mediaUrl = null;
        if(selectedFile) {
            try {
                mediaUrl = await uploadToImgBB(selectedFile, imgbbApiKey);
            } catch(e) {
                alert('Ошибка загрузки фото: ' + e.message);
                return;
            }
        }
        const post = {
            authorId: currentUser.uid,
            authorName: userNameSpan.innerText,
            text: text,
            mediaUrl: mediaUrl,
            timestamp: Date.now(),
            likes: 0,
            commentsCount: 0
        };
        await db.ref('posts').push(post);
        postText.value = '';
        selectedFile = null;
        selectedFileNameDiv.innerText = '';
        loadPosts();
    };
    function selectFile(accept) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = accept;
        input.onchange = e => {
            if(e.target.files[0]) {
                selectedFile = e.target.files[0];
                selectedFileNameDiv.innerText = `Выбрано: ${selectedFile.name}`;
            }
        };
        input.click();
    }
    uploadPhotoBtn.onclick = () => selectFile('image/*');

    // Чаты и группы
    function loadGroups() {
        if(!currentUser) return;
        db.ref('groups').on('value', snap => {
            const groups = snap.val();
            groupsListDiv.innerHTML = '';
            if(groups) {
                Object.keys(groups).forEach(groupId => {
                    const group = groups[groupId];
                    const div = document.createElement('div');
                    div.className = 'group-item';
                    div.innerHTML = `<i class="fas fa-users"></i><span>${escapeHtml(group.name)}</span>`;
                    div.onclick = () => openGroup(groupId, group.name);
                    groupsListDiv.appendChild(div);
                });
            }
        });
    }

    function openGroup(groupId, groupName) {
        if(rknActive) { alert('РКН режим: чат недоступен'); return; }
        currentGroupId = groupId;
        chatGroupNameSpan.innerText = groupName;
        chatWindow.style.display = 'flex';
        if(messagesRef) messagesRef.off();
        messagesRef = db.ref(`rooms/${groupId}/messages`);
        messagesRef.on('child_added', snap => {
            const msg = snap.val();
            if(msg) {
                const isMe = msg.senderId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `message ${isMe ? 'me' : 'other'}`;
                const header = document.createElement('div');
                header.className = 'message-header';
                header.innerText = isMe ? 'Вы' : `${msg.senderName || 'Гость'} (Гееей)`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerText = msg.text;
                div.appendChild(header);
                div.appendChild(bubble);
                chatMessagesDiv.appendChild(div);
                chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
            }
        });
        db.ref(`rooms/${groupId}/users/${currentUser.uid}`).set({ name: userNameSpan.innerText });
        db.ref(`rooms/${groupId}/users/${currentUser.uid}`).onDisconnect().remove();

        if(callRef) callRef.off();
        callRef = db.ref(`calls/${groupId}`);
        callRef.on('child_added', snap => {
            const callData = snap.val();
            if(!callData) return;
            if(callData.type === 'offer' && callData.to === currentUser.uid && !isInCall && !isCalling) {
                if(rknActive) { callRef.child(snap.key).remove(); return; }
                const accept = confirm(`Входящий звонок от ${callData.fromName}. Ответить?`);
                if(accept) {
                    localRingtone.pause();
                    localRingtone.currentTime = 0;
                    callRef.child(snap.key).remove();
                    startPeerAsAnswerer(callData.offer);
                } else {
                    callRef.child(snap.key).remove();
                }
            } else if(callData.type === 'answer' && peer && !isInCall && callData.to === currentUser.uid) {
                peer.signal(callData.answer);
                callRef.child(snap.key).remove();
            }
        });
    }

    function sendChatMessage(text) {
        if(!text.trim() || rknActive) return;
        messagesRef.push({
            text: text.trim(),
            senderId: currentUser.uid,
            senderName: userNameSpan.innerText,
            timestamp: Date.now()
        });
    }
    chatForm.onsubmit = (e) => {
        e.preventDefault();
        sendChatMessage(chatInput.value);
        chatInput.value = '';
    };
    closeChatBtn.onclick = () => {
        if(messagesRef) messagesRef.off();
        if(callRef) callRef.off();
        chatWindow.style.display = 'none';
        chatMessagesDiv.innerHTML = '';
        currentGroupId = null;
        if(peer) endCall();
    };
    addGroupBtn.onclick = () => createGroupModal.classList.add('active');
    confirmCreateGroupBtn.onclick = () => {
        const name = document.getElementById('newGroupName').value.trim();
        if(name) {
            db.ref('groups').push({ name, createdAt: Date.now() });
            createGroupModal.classList.remove('active');
            document.getElementById('newGroupName').value = '';
        }
    };

    // Звонки
    function showCallUserModal() {
        if(!currentGroupId) return;
        db.ref(`rooms/${currentGroupId}/users`).once('value', snap => {
            const users = snap.val();
            usersListForCall.innerHTML = '';
            for(let uid in users) {
                if(uid !== currentUser.uid) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-call-item';
                    userDiv.innerText = users[uid].name || uid;
                    userDiv.onclick = () => {
                        callUserModal.classList.remove('active');
                        startCallToUser(uid, users[uid].name);
                    };
                    usersListForCall.appendChild(userDiv);
                }
            }
            callUserModal.classList.add('active');
        });
    }

    function startCallToUser(targetUid, targetName) {
        if(rknActive) { alert('РКН режим: звонки недоступны'); return; }
        if(isInCall) { alert('Вы уже в звонке'); return; }
        isCalling = true;
        callInChatBtn.classList.add('ringing');
        localRingtone.loop = true;
        localRingtone.play().catch(e => console.log);
        peer = new SimplePeer({ initiator: true, trickle: false });
        peer.on('signal', data => {
            const callId = db.ref(`calls/${currentGroupId}`).push();
            callId.set({
                type: 'offer',
                from: currentUser.uid,
                fromName: userNameSpan.innerText,
                to: targetUid,
                offer: data,
                timestamp: Date.now()
            }).then(() => {
                setTimeout(() => {
                    if(isCalling && !isInCall) {
                        endCall();
                        alert('Собеседник не ответил');
                    }
                }, 30000);
            });
        });
        peer.on('connect', () => {
            isInCall = true;
            isCalling = false;
            callInChatBtn.classList.remove('ringing');
            callInChatBtn.innerText = '📞 В звонке';
            localRingtone.pause();
            localRingtone.currentTime = 0;
        });
        peer.on('close', endCall);
        peer.on('error', err => { console.error(err); endCall(); });
    }

    function startPeerAsAnswerer(offerSignal) {
        peer = new SimplePeer({ initiator: false, trickle: false });
        peer.on('signal', data => {
            const callId = db.ref(`calls/${currentGroupId}`).push();
            callId.set({
                type: 'answer',
                from: currentUser.uid,
                to: currentUser.uid,
                answer: data,
                timestamp: Date.now()
            });
        });
        peer.on('connect', () => {
            isInCall = true;
            callInChatBtn.classList.remove('ringing');
            callInChatBtn.innerText = '📞 В звонке';
            ringtone.pause();
            ringtone.currentTime = 0;
        });
        peer.on('close', endCall);
        peer.on('error', endCall);
        peer.signal(offerSignal);
    }

    function endCall() {
        if(peer) { peer.destroy(); peer = null; }
        isInCall = false;
        isCalling = false;
        callInChatBtn.classList.remove('ringing');
        callInChatBtn.innerText = '📞 Звонок';
        localRingtone.pause();
        localRingtone.currentTime = 0;
        ringtone.pause();
        ringtone.currentTime = 0;
    }

    callInChatBtn.onclick = () => {
        if(isInCall) endCall();
        else showCallUserModal();
    };
    closeCallModal.onclick = () => callUserModal.classList.remove('active');

    // Настройки и ник
    settingsBtn.onclick = () => settingsModal.classList.add('active');
    editProfileBtn.onclick = () => nicknameModal.classList.add('active');
    saveNicknameBtn.onclick = () => {
        const newName = document.getElementById('newNickname').value.trim();
        if(newName && currentUser) {
            db.ref(`users/${currentUser.uid}/name`).set(newName).then(() => {
                userNameSpan.innerText = newName;
                nicknameModal.classList.remove('active');
            });
        }
    };
    document.querySelectorAll('.close-modal-btn').forEach(btn => {
        btn.onclick = () => {
            settingsModal.classList.remove('active');
            nicknameModal.classList.remove('active');
            createGroupModal.classList.remove('active');
            commentsModal.classList.remove('active');
            callUserModal.classList.remove('active');
        };
    });
    anthemBtn.onclick = () => localRingtone.play().catch(e => alert('Разрешите воспроизведение'));

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // Запуск
    initAnonymousAuth();
</script>
</body>
</html>
