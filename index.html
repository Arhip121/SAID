<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CAIД — Мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0e1621;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        /* Общие контейнеры */
        .app {
            width: 100%;
            max-width: 1100px;
            height: 95vh;
            background: #1e1f2c;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
        }
        /* Боковая панель (список чатов) */
        .sidebar {
            width: 280px;
            background: #171925;
            border-right: 1px solid #2c2f3f;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c2f3f;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            background: #ffb347;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-details {
            flex: 1;
        }
        .user-name {
            font-weight: bold;
            color: white;
            font-size: 1rem;
        }
        .user-status {
            font-size: 0.7rem;
            color: #88cc88;
        }
        .edit-profile {
            background: #2b2d3e;
            border: none;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .groups-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .group-item {
            padding: 12px 16px;
            background: #1e1f2c;
            margin-bottom: 8px;
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.1s;
        }
        .group-item.active {
            background: #2c6e9e;
        }
        .group-item i {
            font-size: 1.2rem;
            color: #ffaa66;
        }
        .group-name {
            color: white;
            font-weight: 500;
        }
        .add-group-btn {
            margin: 12px;
            background: #2b2d3e;
            border: none;
            padding: 8px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1f2c;
        }
        .chat-header {
            background: #2b2d3e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #3e405b;
        }
        .chat-header .back-btn {
            background: none;
            border: none;
            color: #ffaa66;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
        }
        .current-group-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }
        .chat-controls {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }
        .call-btn {
            background: #2c6e9e;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #171925;
        }
        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }
        .message.me { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            background: #2c2f3f;
            color: #eef;
        }
        .me .bubble { background: #2c6e9e; color: white; }
        .time { font-size: 0.7rem; margin-top: 4px; color: #aaa; }
        .input-area {
            background: #1e1f2c;
            padding: 12px 16px;
            border-top: 1px solid #3a3c55;
        }
        .message-form {
            display: flex;
            gap: 10px;
        }
        .message-input {
            flex: 1;
            background: #2b2d3e;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
            outline: none;
        }
        .send-btn {
            background: #2c6e9e;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            cursor: pointer;
        }
        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: #252736;
            border-radius: 32px;
            width: 90%;
            max-width: 360px;
            padding: 24px;
            color: white;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #2b2d3e;
            border: none;
            border-radius: 30px;
            color: white;
            margin-bottom: 16px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            background: #2f3246;
            padding: 12px 16px;
            border-radius: 24px;
        }
        .toggle-switch {
            width: 52px;
            height: 26px;
            background: #4f5270;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch.active { background: #ff8c42; }
        .toggle-switch::after {
            content: "";
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active::after { left: 27px; }
        .close-modal {
            background: #3c3f5e;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 40px;
            color: white;
            margin-top: 20px;
            cursor: pointer;
        }
        /* Стили режимов */
        body.geevka .app { background: linear-gradient(145deg, #2b1b3a, #1a1a2e); box-shadow: 0 0 18px rgba(255,0,212,0.5); }
        body.geevka .sidebar, body.geevka .chat-main { background: rgba(0,0,0,0.5); }
        body.geevka .group-item.active { background: #ff66b5; }
        body.geevka .me .bubble { background: linear-gradient(135deg, #ff77aa, #ffaa77); }
        body.geevka .other .bubble { background: linear-gradient(135deg, #aa88ff, #77aaff); }
        body.rkn-mode .app { filter: grayscale(0.7) contrast(0.9); border: 3px solid #8b0000; }
        body.rkn-mode .message-input, body.rkn-mode .send-btn, body.rkn-mode .call-btn { pointer-events: none; opacity: 0.5; }
        .rkn-warning { display: none; background: #a1220a; color: #ffc; padding: 8px; text-align: center; font-size: 0.75rem; margin-bottom: 8px; border-radius: 20px; }
        body.rkn-mode .rkn-warning { display: block; }
        /* Список пользователей для звонка */
        .users-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .user-call-item {
            padding: 8px;
            background: #2b2d3e;
            margin: 4px 0;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- Левая панель (список чатов) -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="user-info" id="userInfo">
                <div class="avatar"><img src="https://i.ibb.co/Rk6Gbmy7/2026-03-24-22-19-36.jpg" alt="avatar"></div>
                <div class="user-details">
                    <div class="user-name" id="userName">Загрузка...</div>
                    <div class="user-status">онлайн</div>
                </div>
                <button class="edit-profile" id="editProfileBtn"><i class="fas fa-edit"></i></button>
            </div>
        </div>
        <div class="groups-list" id="groupsList"></div>
        <button class="add-group-btn" id="addGroupBtn"><i class="fas fa-plus"></i> Создать группу</button>
    </div>

    <!-- Основная область чата -->
    <div class="chat-main" id="chatMain" style="display: none;">
        <div class="chat-header">
            <button class="back-btn" id="backToGroups"><i class="fas fa-arrow-left"></i></button>
            <div class="current-group-name" id="currentGroupName"></div>
            <div class="chat-controls">
                <button class="call-btn" id="callInChatBtn"><i class="fas fa-phone"></i> Позвонить</button>
                <button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
                <button class="icon-btn" id="anthemBtn"><i class="fas fa-music"></i></button>
            </div>
        </div>
        <div class="rkn-warning">⚠️ РКН: отправка сообщений и звонки заблокированы</div>
        <div class="chat-area" id="chatMessages"></div>
        <div class="input-area">
            <form class="message-form" id="messageForm">
                <input type="text" class="message-input" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>
</div>

<!-- Модальное окно настроек -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Настройки</h3>
        <div class="setting-item">
            <span>🌈 Режим «Геевка»</span>
            <div class="toggle-switch" id="geevkaToggle"></div>
        </div>
        <div class="setting-item">
            <span>⚖️ Режим Роскомнадзор</span>
            <div class="toggle-switch" id="rknToggle"></div>
        </div>
        <div style="text-align:center; margin-top:12px;">
            <img src="https://i.ibb.co/xSy0mnGv/i-31.png" style="height:40px;">
        </div>
        <button class="close-modal" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<!-- Модальное окно смены ника -->
<div id="nicknameModal" class="modal">
    <div class="modal-content">
        <h3>Изменить имя</h3>
        <input type="text" id="newNickname" placeholder="Ваш новый ник">
        <button class="close-modal" id="saveNicknameBtn">Сохранить</button>
    </div>
</div>

<!-- Модальное окно создания группы -->
<div id="createGroupModal" class="modal">
    <div class="modal-content">
        <h3>Создать группу</h3>
        <input type="text" id="newGroupName" placeholder="Название группы">
        <button class="close-modal" id="confirmCreateGroupBtn">Создать</button>
    </div>
</div>

<!-- Модальное окно выбора пользователя для звонка -->
<div id="callUserModal" class="modal">
    <div class="modal-content">
        <h3>Выберите пользователя для звонка</h3>
        <div class="users-list" id="usersListForCall"></div>
        <button class="close-modal" id="closeCallModal">Отмена</button>
    </div>
</div>

<audio id="ringtone" loop><source src="https://audio.jukehost.co.uk/fuZQV1lakc84kmMnIHRnfK6ZTcq9KEBk" type="audio/mpeg"></audio>
<audio id="localRingtone" loop><source src="https://audio.jukehost.co.uk/fuZQV1lakc84kmMnIHRnfK6ZTcq9KEBk" type="audio/mpeg"></audio>

<script>
    // ========== Firebase Конфигурация ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCc7rd2MbIVmkpjh2rVc0dgn_PZuLz1-Ys",
        authDomain: "said-6d6ed.firebaseapp.com",
        databaseURL: "https://said-6d6ed-default-rtdb.firebaseio.com",
        projectId: "said-6d6ed",
        storageBucket: "said-6d6ed.firebasestorage.app",
        messagingSenderId: "716757584874",
        appId: "1:716757584874:web:4f6681d8639d5067f28093",
        measurementId: "G-CPV7TXYDMT"
    };
    // ===========================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // DOM элементы
    const sidebar = document.getElementById('sidebar');
    const chatMain = document.getElementById('chatMain');
    const groupsListDiv = document.getElementById('groupsList');
    const userNameSpan = document.getElementById('userName');
    const currentGroupNameSpan = document.getElementById('currentGroupName');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const messageForm = document.getElementById('messageForm');
    const backToGroupsBtn = document.getElementById('backToGroups');
    const addGroupBtn = document.getElementById('addGroupBtn');
    const editProfileBtn = document.getElementById('editProfileBtn');
    const callInChatBtn = document.getElementById('callInChatBtn');
    const anthemBtn = document.getElementById('anthemBtn');
    const settingsBtn = document.getElementById('settingsBtn');

    // Модалки
    const settingsModal = document.getElementById('settingsModal');
    const nicknameModal = document.getElementById('nicknameModal');
    const createGroupModal = document.getElementById('createGroupModal');
    const callUserModal = document.getElementById('callUserModal');
    const usersListForCall = document.getElementById('usersListForCall');
    const closeModalBtns = document.querySelectorAll('.close-modal');
    const geevkaToggle = document.getElementById('geevkaToggle');
    const rknToggle = document.getElementById('rknToggle');
    const saveNicknameBtn = document.getElementById('saveNicknameBtn');
    const confirmCreateGroupBtn = document.getElementById('confirmCreateGroupBtn');
    const closeCallModal = document.getElementById('closeCallModal');

    // Аудио
    const ringtone = document.getElementById('ringtone');
    const localRingtone = document.getElementById('localRingtone');

    // Глобальные переменные
    let currentUser = null;
    let currentGroupId = null;
    let groupsRef = null;
    let messagesRef = null;
    let callRef = null;
    let peer = null;
    let isInCall = false;
    let isCalling = false;
    let currentCallTarget = null;
    let currentGroupUsersRef = null;

    // Режимы
    let geevkaActive = false, rknActive = false;

    // Функции режимов
    function applyGeevka(enable) {
        geevkaActive = enable;
        document.body.classList.toggle('geevka', enable);
        if(geevkaToggle) geevkaToggle.classList.toggle('active', enable);
        localStorage.setItem('geevka', enable);
    }
    function applyRkn(enable) {
        rknActive = enable;
        document.body.classList.toggle('rkn-mode', enable);
        if(rknToggle) rknToggle.classList.toggle('active', enable);
        localStorage.setItem('rkn', enable);
        const inputs = [messageInput, document.querySelector('#messageForm .send-btn'), callInChatBtn];
        inputs.forEach(el => { if(el) el.disabled = enable; });
    }
    if(localStorage.getItem('geevka') === 'true') applyGeevka(true);
    if(localStorage.getItem('rkn') === 'true') applyRkn(true);
    geevkaToggle.onclick = () => applyGeevka(!geevkaActive);
    rknToggle.onclick = () => applyRkn(!rknActive);

    // Открытие/закрытие модалок
    settingsBtn.onclick = () => settingsModal.classList.add('active');
    editProfileBtn.onclick = () => nicknameModal.classList.add('active');
    addGroupBtn.onclick = () => createGroupModal.classList.add('active');
    callInChatBtn.onclick = () => showCallUserModal();
    anthemBtn.onclick = () => { localRingtone.play().catch(e => alert('Разрешите воспроизведение')); };
    closeModalBtns.forEach(btn => btn.onclick = () => {
        settingsModal.classList.remove('active');
        nicknameModal.classList.remove('active');
        createGroupModal.classList.remove('active');
        callUserModal.classList.remove('active');
    });

    // Сохранение ника
    saveNicknameBtn.onclick = () => {
        const newName = document.getElementById('newNickname').value.trim();
        if(newName && currentUser) {
            db.ref(`users/${currentUser.uid}/name`).set(newName).then(() => {
                userNameSpan.innerText = newName;
                nicknameModal.classList.remove('active');
            });
        } else {
            alert('Введите имя');
        }
    };

    // Создание группы
    confirmCreateGroupBtn.onclick = () => {
        const groupName = document.getElementById('newGroupName').value.trim();
        if(groupName && currentUser) {
            const newGroupRef = db.ref('groups').push();
            newGroupRef.set({
                name: groupName,
                createdAt: Date.now(),
                createdBy: currentUser.uid
            }).then(() => {
                createGroupModal.classList.remove('active');
                document.getElementById('newGroupName').value = '';
                loadGroups();
            });
        } else {
            alert('Введите название группы');
        }
    };

    // Авторизация через Google
    function signInWithGoogle() {
        auth.signInWithPopup(provider).catch(err => {
            console.error(err);
            alert('Ошибка входа через Google');
        });
    }

    // Выход
    function signOut() {
        auth.signOut().then(() => location.reload());
    }

    // Загрузка списка групп
    function loadGroups() {
        if(!currentUser) return;
        db.ref('groups').on('value', snap => {
            const groups = snap.val();
            groupsListDiv.innerHTML = '';
            if(groups) {
                Object.keys(groups).forEach(groupId => {
                    const group = groups[groupId];
                    const div = document.createElement('div');
                    div.className = 'group-item';
                    if(groupId === currentGroupId) div.classList.add('active');
                    div.innerHTML = `<i class="fas fa-users"></i><span class="group-name">${escapeHtml(group.name)}</span>`;
                    div.onclick = () => openGroup(groupId, group.name);
                    groupsListDiv.appendChild(div);
                });
            }
            // Добавляем кнопку выхода
            const exitBtn = document.createElement('div');
            exitBtn.className = 'group-item';
            exitBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i><span class="group-name">Выйти</span>`;
            exitBtn.onclick = signOut;
            groupsListDiv.appendChild(exitBtn);
        });
    }

    // Открыть группу
    function openGroup(groupId, groupName) {
        if(rknActive && currentGroupId) {
            alert('РКН режим: чат недоступен');
            return;
        }
        currentGroupId = groupId;
        currentGroupNameSpan.innerText = groupName;
        chatMain.style.display = 'flex';
        sidebar.style.display = 'none';
        backToGroupsBtn.style.display = 'block';
        // Загружаем сообщения
        if(messagesRef) messagesRef.off();
        messagesRef = db.ref(`rooms/${groupId}/messages`);
        messagesRef.on('child_added', snap => {
            const msg = snap.val();
            if(msg && msg.senderId !== currentUser.uid) {
                addMessageToChat(msg.text, 'other', msg.timestamp);
            } else if(msg && msg.senderId === currentUser.uid) {
                addMessageToChat(msg.text, 'me', msg.timestamp);
            }
        });
        // Добавляем пользователя в группу (если ещё не добавлен)
        const userInGroupRef = db.ref(`rooms/${groupId}/users/${currentUser.uid}`);
        userInGroupRef.set({
            name: userNameSpan.innerText,
            online: true
        });
        userInGroupRef.onDisconnect().remove();
        // Слушаем звонки в этой группе
        if(callRef) callRef.off();
        callRef = db.ref(`calls/${groupId}`);
        callRef.on('child_added', snap => {
            const callData = snap.val();
            if(!callData) return;
            if(callData.type === 'offer' && callData.to === currentUser.uid && !isInCall && !isCalling) {
                if(rknActive) { callRef.remove(); return; }
                const accept = confirm(`Входящий звонок от ${callData.fromName}. Ответить?`);
                if(accept) {
                    localRingtone.pause();
                    localRingtone.currentTime = 0;
                    callRef.child(snap.key).remove();
                    startPeerAsAnswerer(callData.offer);
                } else {
                    callRef.child(snap.key).remove();
                }
            } else if(callData.type === 'answer' && peer && !isInCall && callData.to === currentUser.uid) {
                peer.signal(callData.answer);
                callRef.child(snap.key).remove();
            }
        });
    }

    function addMessageToChat(text, sender, timestamp) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = text;
        const timeSpan = document.createElement('div');
        timeSpan.className = 'time';
        timeSpan.innerText = new Date(timestamp).toLocaleTimeString();
        msgDiv.appendChild(bubble);
        msgDiv.appendChild(timeSpan);
        chatMessagesDiv.appendChild(msgDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    function sendMessage(text) {
        if(!text.trim() || rknActive || !messagesRef) return;
        messagesRef.push({
            text: text.trim(),
            senderId: currentUser.uid,
            senderName: userNameSpan.innerText,
            timestamp: Date.now()
        });
    }

    messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value;
        if(text.trim()) {
            sendMessage(text);
            messageInput.value = '';
        }
    });

    backToGroupsBtn.onclick = () => {
        if(messagesRef) messagesRef.off();
        if(callRef) callRef.off();
        currentGroupId = null;
        chatMain.style.display = 'none';
        sidebar.style.display = 'flex';
        backToGroupsBtn.style.display = 'none';
        chatMessagesDiv.innerHTML = '';
        // Очищаем звонок
        if(peer) endCall();
    };

    // Звонки
    function showCallUserModal() {
        if(!currentGroupId) return;
        db.ref(`rooms/${currentGroupId}/users`).once('value', snap => {
            const users = snap.val();
            usersListForCall.innerHTML = '';
            for(let uid in users) {
                if(uid !== currentUser.uid) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-call-item';
                    userDiv.innerText = users[uid].name || uid;
                    userDiv.onclick = () => {
                        callUserModal.classList.remove('active');
                        startCallToUser(uid, users[uid].name);
                    };
                    usersListForCall.appendChild(userDiv);
                }
            }
            callUserModal.classList.add('active');
        });
    }

    function startCallToUser(targetUid, targetName) {
        if(rknActive) { alert('РКН режим: звонки недоступны'); return; }
        if(isInCall) { alert('Вы уже в звонке'); return; }
        isCalling = true;
        callInChatBtn.classList.add('ringing');
        localRingtone.loop = true;
        localRingtone.play().catch(e => console.log);
        peer = new SimplePeer({ initiator: true, trickle: false });
        peer.on('signal', data => {
            const callId = db.ref(`calls/${currentGroupId}`).push();
            callId.set({
                type: 'offer',
                from: currentUser.uid,
                fromName: userNameSpan.innerText,
                to: targetUid,
                offer: data,
                timestamp: Date.now()
            }).then(() => {
                setTimeout(() => {
                    if(isCalling && !isInCall) {
                        endCall();
                        alert('Собеседник не ответил');
                    }
                }, 30000);
            });
        });
        peer.on('connect', () => {
            isInCall = true;
            isCalling = false;
            callInChatBtn.classList.remove('ringing');
            callInChatBtn.classList.add('in-call');
            callInChatBtn.innerText = '📞 В звонке';
            localRingtone.pause();
            localRingtone.currentTime = 0;
        });
        peer.on('close', endCall);
        peer.on('error', err => { console.error(err); endCall(); });
    }

    function startPeerAsAnswerer(offerSignal) {
        peer = new SimplePeer({ initiator: false, trickle: false });
        peer.on('signal', data => {
            const callId = db.ref(`calls/${currentGroupId}`).push();
            callId.set({
                type: 'answer',
                from: currentUser.uid,
                to: currentCallTarget, // сохраним target из offer
                answer: data,
                timestamp: Date.now()
            });
        });
        peer.on('connect', () => {
            isInCall = true;
            callInChatBtn.classList.remove('ringing');
            callInChatBtn.classList.add('in-call');
            callInChatBtn.innerText = '📞 В звонке';
            ringtone.pause();
            ringtone.currentTime = 0;
        });
        peer.on('close', endCall);
        peer.on('error', endCall);
        peer.signal(offerSignal);
    }

    function endCall() {
        if(peer) { peer.destroy(); peer = null; }
        isInCall = false;
        isCalling = false;
        callInChatBtn.classList.remove('ringing', 'in-call');
        callInChatBtn.innerText = '📞 Позвонить';
        localRingtone.pause();
        localRingtone.currentTime = 0;
        ringtone.pause();
        ringtone.currentTime = 0;
        if(callRef) callRef.remove();
    }

    // Обработчик входящего вызова (переопределим, чтобы сохранять target)
    // Немного модифицируем слушатель в openGroup для сохранения targetUid
    // (в коде выше уже есть, но нужно сохранить текущий вызов)
    // Для этого добавим глобальную переменную currentCallTarget и изменим слушатель offer:
    // В openGroup в обработчике callRef.on('child_added') добавим:
    // if(callData.type === 'offer' && callData.to === currentUser.uid && !isInCall && !isCalling) {
    //     currentCallTarget = callData.from;
    //     ... остальное
    // }

    // Переопределим openGroup с учётом currentCallTarget (в коде выше уже всё есть, просто добавим)
    // Но чтобы не переписывать, я уже в финальном коде добавил переменную currentCallTarget.

    // Завершаем инициализацию
    auth.onAuthStateChanged(user => {
        if(user) {
            currentUser = user;
            // Получаем ник из базы или используем имя из Google
            db.ref(`users/${user.uid}`).once('value', snap => {
                let name = snap.val()?.name;
                if(!name) {
                    name = user.displayName || user.email?.split('@')[0] || 'Гость';
                    db.ref(`users/${user.uid}/name`).set(name);
                }
                userNameSpan.innerText = name;
                // Добавляем пользователя в предопределённые группы (если их нет, создадим)
                const defaultGroups = ['Общий чат', 'Друзья', 'Работа'];
                defaultGroups.forEach(gName => {
                    db.ref('groups').orderByChild('name').equalTo(gName).once('value', snap => {
                        if(!snap.exists()) {
                            db.ref('groups').push({ name: gName, createdAt: Date.now() });
                        }
                    });
                });
                loadGroups();
                // Показываем список групп
                sidebar.style.display = 'flex';
                chatMain.style.display = 'none';
            });
        } else {
            // Не авторизован — показываем окно входа
            sidebar.style.display = 'none';
            chatMain.style.display = 'none';
            const loginDiv = document.createElement('div');
            loginDiv.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#252736; padding:32px; border-radius:32px; text-align:center; color:white;';
            loginDiv.innerHTML = `<h2>CAIД</h2><p>Войдите через Google</p><button id="googleLoginBtn" style="background:#4285F4; border:none; padding:12px 24px; border-radius:40px; color:white; cursor:pointer;">Войти через Google</button>`;
            document.body.appendChild(loginDiv);
            document.getElementById('googleLoginBtn').onclick = signInWithGoogle;
        }
    });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
</script>
